<!DOCTYPE html>
<html>
<head>
    <title>Second Brain Autofill</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; width: 300px; padding: 20px; background-color: #f8fafc; color: #0f172a; margin: 0; }
        .input-group { margin-bottom: 12px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: #475569; }
        input { width: 100%; box-sizing: border-box; padding: 8px 12px; border: 1px solid #cbd5e1; border-radius: 6px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #6366f1; }
        button { width: 100%; background: #6366f1; color: white; border: none; padding: 10px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:hover { background: #4f46e5; }
        #status { font-size: 13px; text-align: center; margin-top: 14px; font-weight: 500; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        .hidden { display: none; }
        .header { display: flex; align-items: center; justify-content: center; margin-bottom: 20px; gap: 8px; }
        .logo { width: 24px; height: 24px; background: #6366f1; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"></div>
        <h2 style="margin: 0; font-size: 16px;">Second Brain Autofill</h2>
    </div>

    <div id="login-view">
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="john_doe" />
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" />
        </div>
        <button id="login-btn">Connect Second Brain</button>
    </div>

    <div id="sync-view" class="hidden">
        <p style="text-align: center; font-size: 14px; color: #475569; margin-bottom: 20px;">
            Connected dynamically. Your credentials will autofill seamlessly across the web.
        </p>
        <button id="sync-btn" style="background: #10b981;">Manual Refresh Sync</button>
        <button id="logout-btn" style="background: #ef4444; margin-top: 8px;">Disconnect</button>
    </div>

    <div id="status"></div>

    <script src="popup.js"></script>
</body>
</html>
